name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    name: unit (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Test all packages
        run: go test ./...

  bert-ner-e2e:
    name: BERT NER e2e (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run live BERT NER example test
        env:
          GONNX_LIVE_BERT_NER: "1"
        run: go test -v ./examples/bert_ner -run TestLiveBertNERRecognizesEntities -count=1 -timeout=15m
